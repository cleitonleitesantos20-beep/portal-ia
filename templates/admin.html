<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Inteligente/A</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --bg-black: #0d1117; --card-gray: #161b22; --border-gray: #30363d;
            --neon-blue: #00d4ff; --neon-purple: #bc8cff; --text-gray: #8b949e; --danger: #ff4d4d;
        }
        body { background: var(--bg-black); color: white; padding: 20px; font-family: 'Inter', sans-serif; }
        .admin-container { max-width: 950px; margin: 40px auto; background: var(--card-gray); padding: 30px; border-radius: 20px; border: 1px solid var(--border-gray); }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border-gray); overflow-x: auto; }
        .tab-btn { background: transparent; border: none; color: var(--text-gray); padding: 12px 20px; cursor: pointer; font-weight: 600; white-space: nowrap; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--neon-blue); border-bottom-color: var(--neon-blue); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        form { display: flex; flex-direction: column; gap: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { padding: 12px; background: #0d1117; border: 1px solid var(--border-gray); color: white; border-radius: 8px; }
        .btn-submit { background: var(--neon-blue); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Estilo da Lista de Gerenciamento */
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-gray); }
        .manage-item:hover { background: #1c2128; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 1.2rem;">PAINEL DE <span style="color: var(--neon-blue);">CONTROLE</span></h1>
            <a href="/" style="color: var(--text-gray); text-decoration: none; font-size: 0.8rem;">Sair</a>
        </header>

        <nav class="tab-menu">
            <button class="tab-btn active" onclick="openTab(event, 'noticia')">📰 NOVA NOTÍCIA</button>
            <button class="tab-btn" onclick="openTab(event, 'produto')">🛒 NOVO PRODUTO</button>
            <button class="tab-btn" onclick="openTab(event, 'gerenciar')">🛠️ GERENCIAR ATUAIS</button>
        </nav>

        <div id="noticia" class="tab-content active">
            <form action="/admin/postar" method="post">
                <input type="text" name="titulo" placeholder="Título da Notícia" required>
                <input type="text" name="categoria" placeholder="Categoria" required>
                <input type="url" name="imagem_url" placeholder="URL da Imagem" required>
                <textarea name="conteudo" placeholder="Conteúdo..." rows="6" required></textarea>
                <button type="submit" class="btn-submit">Publicar Notícia</button>
            </form>
        </div>

        <div id="produto" class="tab-content">
            <form action="/admin/cadastrar_produto" method="post">
                <div class="form-row">
                    <input type="text" name="nome" placeholder="Nome do Produto" required>
                    <input type="text" name="categoria_txt" placeholder="Categoria Visual" required>
                </div>
                <div class="form-row">
                    <select name="tipo">
                        <option value="web_bot">🤖 Web Bot</option>
                        <option value="trade_bot">📊 Trade Bot</option>
                        <option value="ebook">📚 E-book</option>
                        <option value="infoproduto">🛒 Infoproduto</option>
                    </select>
                    <input type="text" name="preco" placeholder="Preço (Opcional)">
                </div>
                <input type="url" name="imagem_url" placeholder="URL da Imagem do Card" required>
                
                <h3 style="font-size: 0.9rem; color: var(--neon-purple); margin-bottom: 0;">Links de Venda (Multi-Plataforma)</h3>
                <input type="url" name="link_venda" placeholder="Link Principal (ex: Kiwify)" required>
                <input type="url" name="link_venda_2" placeholder="Link Alternativo 2 (ex: Hotmart)">
                <input type="url" name="link_venda_3" placeholder="Link Alternativo 3 (ex: Shopee)">
                
                <textarea name="descricao" placeholder="Descrição curta..." rows="3" required></textarea>
                <button type="submit" class="btn-submit" style="background: var(--neon-purple);">Cadastrar Produto</button>
            </form>
        </div>

        <div id="gerenciar" class="tab-content">
            <h2 style="font-size: 1rem; color: var(--neon-blue);">Gerenciar Conteúdo Existente</h2>
            
            <div style="margin-top: 20px;">
                <h3 style="font-size: 0.9rem; border-left: 3px solid var(--neon-blue); padding-left: 10px;">Notícias</h3>
                <div id="lista-noticias">
                    <p style="color: var(--text-gray); font-size: 0.8rem;">Acesse a Home para ver os IDs ou use a rota de exclusão direta.</p>
                </div>

                <h3 style="font-size: 0.9rem; border-left: 3px solid var(--neon-purple); padding-left: 10px; margin-top: 30px;">Produtos</h3>
                <p style="color: var(--text-gray); font-size: 0.8rem;">Para excluir, use os botões abaixo (Exemplo rápido):</p>
                 <form action="/admin/excluir/noticia/" method="get" style="flex-direction: row; gap: 5px;">
                    <input type="number" name="id" placeholder="ID da Notícia" style="width: 100px;">
                    <button class="btn-delete" type="submit">Excluir Notícia</button>
                 </form>
                 <br>
                 <form action="/admin/excluir/produto/" method="get" style="flex-direction: row; gap: 5px;">
                    <input type="number" name="id" placeholder="ID do Produto" style="width: 100px;">
                    <button class="btn-delete" type="submit">Excluir Produto</button>
                 </form>
            </div>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.querySelectorAll(".tab-content");
            const buttons = document.querySelectorAll(".tab-btn");
            contents.forEach(c => c.classList.remove("active"));
            buttons.forEach(b => b.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
